<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kepler</title>
  <meta name="description" content="Per-app network tunnel for Windows." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div id="app">
    <header class="header" id="header">
      <div class="header__left">
        <img class="header__logo" src="kepler.svg" alt="Kepler Logo" />
        <span class="header__title">Kepler</span>
      </div>
      <div class="header__right">
        <button class="btn btn--icon" id="settingsBtn" title="Settings" type="button">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3" />
            <path
              d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
          </svg>
        </button>

        <button class="btn btn--tunnel-toggle" id="masterTunnelBtn" type="button">Start Tunnel</button>

        <div class="status" id="statusPill">
          <span class="status__dot"></span>
          <span class="status__text" id="statusLabel">Idle</span>
        </div>

        <div class="window-controls">
          <button class="window-btn" id="winMinimizeBtn" title="Minimize" type="button">
            <svg width="10" height="10" viewBox="0 0 10 10">
              <line x1="1" y1="5" x2="9" y2="5" stroke="currentColor" stroke-width="1.2" />
            </svg>
          </button>
          <button class="window-btn window-btn--close" id="winCloseBtn" title="Close" type="button">
            <svg width="10" height="10" viewBox="0 0 10 10">
              <line x1="1" y1="1" x2="9" y2="9" stroke="currentColor" stroke-width="1.2" />
              <line x1="9" y1="1" x2="1" y2="9" stroke="currentColor" stroke-width="1.2" />
            </svg>
          </button>
        </div>
      </div>
    </header>

    <main class="main" id="main">
      <div class="toolbar" id="toolbar">
        <div class="search">
          <svg class="search__icon" width="14" height="14" viewBox="0 0 16 16" fill="none">
            <circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.3" />
            <path d="M11 11l3.5 3.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" />
          </svg>
          <input type="text" id="searchInput" class="search__input" placeholder="Search processes…" autocomplete="off"
            spellcheck="false" />
        </div>
        <button class="btn" id="refreshBtn" title="Refresh" type="button">Refresh</button>

        <div class="dropdown" id="actionsDropdown">
          <button class="btn" id="actionsBtn" type="button" disabled>
            Actions
            <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
              <path d="M2.5 4L5 6.5 7.5 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"
                stroke-linejoin="round" />
            </svg>
          </button>
          <div class="dropdown__menu" id="actionsMenu">
            <button class="dropdown__item" id="tunnelSelectedBtn" type="button">Tunnel selected</button>
            <button class="dropdown__item" id="stopSelectedBtn" type="button">Stop selected</button>
          </div>
        </div>
      </div>

      <section class="card" id="processPanel">
        <div class="card__head">
          <span class="card__title">Processes</span>
          <span class="card__count" id="processCount">—</span>
        </div>
        <div class="table-wrap" id="tableWrapper">
          <table class="table" id="processTable">
            <thead>
              <tr>
                <th class="col-check"><input type="checkbox" id="selectAllCheckbox" /></th>
                <th class="col-name">Name</th>
                <th class="col-pid">PID</th>
                <th class="col-action">Action</th>
              </tr>
            </thead>
            <tbody id="processTableBody"></tbody>
          </table>
          <div class="empty" id="emptyState" hidden>
            <p class="empty__text" id="emptyStateText">No processes found</p>
            <p class="empty__hint">Try adjusting the search filter or refresh.</p>
          </div>
        </div>
      </section>

      <section class="card card--compact" id="autoTunnelPanel">
        <div class="card__head">
          <span class="card__title">Auto-Tunnel Rules</span>
          <span class="card__count" id="autoTunnelCount">0</span>
        </div>
        <div class="card__body">
          <div class="rule-input">
            <input type="text" id="autoTunnelInput" class="input" placeholder="App name (e.g. discord, chrome)…"
              autocomplete="off" spellcheck="false" />
            <button class="btn btn--add" id="autoTunnelAddBtn" type="button">Add</button>
          </div>
          <div class="tags" id="autoTunnelTags"></div>
        </div>
      </section>
    </main>

    <footer class="footer" id="footer">
      <div class="footer__stats">
        <span class="footer__stat"><span class="footer__label">NAT</span> <span
            id="statConnectionsValue">0</span></span>
        <span class="footer__sep"></span>
        <span class="footer__stat"><span class="footer__label">Driver</span> <span
            id="statDriverValue">Ready</span></span>
      </div>
      <span class="footer__ver">v0.1.0</span>
    </footer>

    <div class="modal-overlay" id="proxyModal" hidden>
      <div class="modal-backdrop" id="proxyModalBackdrop"></div>
      <div class="modal">
        <div class="modal__head">
          <span class="modal__title">Settings</span>
          <button class="btn btn--icon modal__close" id="proxyModalClose" type="button" title="Close">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" />
            </svg>
          </button>
        </div>
        <div class="modal__body">
          <div class="field">
            <label class="field__label">Enable proxy</label>
            <label class="switch">
              <input type="checkbox" id="proxyEnabled" />
              <span class="switch__track"></span>
              <span class="switch__label" id="proxyEnabledLabel">Off</span>
            </label>
          </div>

          <div class="field">
            <label class="field__label" for="proxyHost">Host</label>
            <input type="text" id="proxyHost" class="input" placeholder="192.168.1.100" autocomplete="off"
              spellcheck="false" />
          </div>
          <div class="field">
            <label class="field__label" for="proxyPort">Port</label>
            <input type="number" id="proxyPort" class="input" placeholder="1080" min="1" max="65535" />
          </div>
          <div class="field">
            <label class="field__label" for="proxyUsername">Username</label>
            <input type="text" id="proxyUsername" class="input" placeholder="optional" autocomplete="off" />
          </div>
          <div class="field">
            <label class="field__label" for="proxyPassword">Password</label>
            <input type="password" id="proxyPassword" class="input" placeholder="optional" autocomplete="off" />
          </div>
        </div>
        <div class="modal__foot">
          <button class="btn btn--test" id="proxyTest" type="button">Test</button>
          <span class="modal__test-status" id="proxyTestStatus"></span>
          <span class="spacer"></span>
          <button class="btn" id="proxyCancel" type="button">Cancel</button>
          <button class="btn btn--primary" id="proxySave" type="button">Save</button>
        </div>
      </div>
    </div>

    <div class="toast-container" id="toastContainer" aria-live="polite"></div>
  </div>

  <script src="main.js"></script>
</body>

</html>
